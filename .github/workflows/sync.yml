name: sync

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Number of episodes to upload in one run"
        required: false
        default: "30"
      num_shards:
        description: "Total parallel shards"
        required: false
        default: "2"
      allow_subtitles:
        description: "Allow CZ subtitle-only sources"
        required: false
        default: "true"
      continue_uploads:
        description: "Queue another upload batch after this one when prepared episodes remain"
        required: false
        default: "true"
  schedule:
    - cron: "*/10 * * * *"

# Keep one complete two-shard upload active and one successor queued. GitHub
# replaces an older pending run when another trigger arrives, but never stops
# the run that is currently uploading.
concurrency:
  group: series-to-prehrajto-sync
  cancel-in-progress: false

jobs:
  upload-batch:
    name: Upload series episodes
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write
      actions: write
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON((inputs.num_shards || '2') == '2' && '[0,1]' || '[0]') }}
    env:
      SYNC_NUM_SHARDS: ${{ inputs.num_shards || '2' }}
      SYNC_SHARD_ID: ${{ matrix.shard }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # The repository has gigabytes of historical state blobs. Uploads
          # only need the current snapshot and rebase their small state commits.
          fetch-depth: 1
          persist-credentials: true

      - name: Refresh to latest origin/main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git for state pushes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Init log entry
        run: |
          mkdir -p state
          LOG="state/sync-shard-${SYNC_SHARD_ID}.log"
          [ "$SYNC_NUM_SHARDS" = "1" ] && LOG="state/sync.log"
          touch "$LOG"
          RUN_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo ""
            echo "===== run $RUN_TS shard=${SYNC_SHARD_ID}/${SYNC_NUM_SHARDS} batch_size=${{ inputs.batch_size }} ($RUN_URL) ====="
          } >> "$LOG"

      - name: Run sync batch
        env:
          PREHRAJTO_EMAIL: ${{ secrets.PREHRAJTO_EMAIL }}
          PREHRAJTO_PASSWORD: ${{ secrets.PREHRAJTO_PASSWORD }}
          CZ_PROXY_URL: ${{ secrets.CZ_PROXY_URL }}
          CZ_PROXY_KEY: ${{ secrets.CZ_PROXY_KEY }}
          WHISPER_LANGUAGE_CHECK: ${{ vars.WHISPER_LANGUAGE_CHECK || '0' }}
          REQUIRE_PREPARED_DESCRIPTIONS: "0"
          REQUIRE_PREPARED_SOURCES: "1"
        run: |
          ARGS=("--count" "${{ inputs.batch_size || '20' }}")
          if [ "${{ inputs.allow_subtitles || 'true' }}" = "true" ]; then
            ARGS+=("--allow-subtitles")
          fi
          python src/sync_batch.py "${ARGS[@]}"

      - name: Commit state + log
        if: always()
        run: |
          set -e
          STATE="state/uploaded-shard-${SYNC_SHARD_ID}.json"
          LOG="state/sync-shard-${SYNC_SHARD_ID}.log"
          if [ "$SYNC_NUM_SHARDS" = "1" ]; then
            STATE="state/uploaded.json"
            LOG="state/sync.log"
          fi
          mkdir -p state
          touch "$STATE" "$LOG"
          git add "$STATE" "$LOG"
          if git diff --cached --quiet; then
            echo "no state changes to commit"
          else
            UP_COUNT=$(python -c "import json,os; p='$STATE'; d=json.load(open(p)) if os.path.getsize(p)>0 else {}; print(len(d.get('uploads',[])))")
            git commit -m "chore: sync series state, total uploads ${UP_COUNT}"
            for attempt in 1 2 3 4 5; do
              git pull --rebase origin main || true
              if git push; then
                exit 0
              fi
              sleep $((attempt * 2))
            done
            echo "failed to push state after retries"
            exit 1
          fi

  queue-next:
    name: Queue next upload and preparation
    runs-on: ubuntu-latest
    needs: upload-batch
    if: always() && needs.upload-batch.result != 'cancelled' && (github.event_name == 'schedule' || inputs.continue_uploads != 'false')
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: true

      - name: Refresh to latest origin/main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Queue next work
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          active_sync_count="$(gh run list --workflow sync.yml --limit 20 --json status --jq '[.[] | select(.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "pending" or .status == "requested")] | length')"
          if python src/upload_queue_status.py --no-require-description; then
            if [ "$active_sync_count" -le 1 ]; then
              echo "upload-ready episodes remain and no other sync is waiting; queueing next upload batch"
              gh workflow run sync.yml \
                -f batch_size="${{ inputs.batch_size || '20' }}" \
                -f num_shards="${{ inputs.num_shards || '2' }}" \
                -f allow_subtitles="${{ inputs.allow_subtitles || 'true' }}" \
                -f continue_uploads="true"
            else
              echo "upload-ready episodes remain, but another sync is already active or queued"
            fi
            if ! python src/upload_queue_status.py --no-require-description --min-ready 1000; then
              echo "prepared upload queue is below overnight threshold; queueing background manifest preparation"
              gh workflow run prepare-manifest.yml \
                -f series_limit="1200" \
                -f episode_limit="30" \
                -f source_limit_per_episode="8" \
                -f use_whisper="false" \
                -f skip_export="true"
            fi
          else
            echo "no prepared upload-ready episodes remain; queueing manifest preparation"
            gh workflow run prepare-manifest.yml \
              -f series_limit="1200" \
              -f episode_limit="30" \
              -f source_limit_per_episode="8" \
              -f use_whisper="false" \
              -f skip_export="true"
          fi
