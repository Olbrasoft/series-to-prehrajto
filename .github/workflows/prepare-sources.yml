name: prepare-sources

on:
  workflow_dispatch:
    inputs:
      episode_limit:
        description: "Number of episodes to prepare"
        required: false
        default: "10"
      source_limit_per_episode:
        description: "Number of sources to check per episode"
        required: false
        default: "12"
      series_slug:
        description: "Optional series slug"
        required: false
        default: ""
      use_whisper:
        description: "Run Whisper on supported sources"
        required: false
        default: "false"
  schedule:
    - cron: "35 */6 * * *"

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write
    concurrency:
      group: series-to-prehrajto-prepare-sources
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Refresh to latest origin/main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Whisper dependencies
        if: ${{ inputs.use_whisper == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install faster-whisper

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare episode sources
        env:
          CZ_PROXY_URL: ${{ secrets.CZ_PROXY_URL }}
          CZ_PROXY_KEY: ${{ secrets.CZ_PROXY_KEY }}
        run: |
          ARGS=(
            "--episode-limit" "${{ inputs.episode_limit || '10' }}"
            "--source-limit-per-episode" "${{ inputs.source_limit_per_episode || '12' }}"
          )
          if [ -n "${{ inputs.series_slug }}" ]; then
            ARGS+=("--series-slug" "${{ inputs.series_slug }}")
          fi
          if [ "${{ inputs.use_whisper || 'false' }}" = "true" ]; then
            ARGS+=("--use-whisper")
          fi
          python src/prepare_episode_sources.py "${ARGS[@]}"

      - name: Commit preparation results
        if: always()
        run: |
          git add plans/prepared-episodes.jsonl audits/language-audit.jsonl
          if git diff --cached --quiet; then
            echo "no preparation changes"
          else
            git commit -m "chore: prepare series episode sources"
            git pull --rebase origin main || true
            git push
          fi
