name: prepare-manifest

on:
  workflow_dispatch:
    inputs:
      series_limit:
        description: "Max series to process"
        required: false
        default: "200"
      episode_limit:
        description: "Episodes to prepare per run"
        required: false
        default: "15"
      source_limit_per_episode:
        description: "Sources to evaluate per episode"
        required: false
        default: "8"
      use_whisper:
        description: "Use Whisper language verification"
        required: false
        default: "false"
      skip_export:
        description: "Skip DB export (always true in CI)"
        required: false
        default: "true"
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: series-to-prehrajto-prepare-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Refresh to latest origin/main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build upload manifest from existing prepared sources
        run: |
          python src/build_upload_manifest.py \
            --limit 1000 \
            --out manifests/upload-ready.jsonl.gz \
            --report reports/upload-manifest.json

      - name: Commit fast manifest
        run: |
          set -e
          git add manifests/upload-ready.jsonl.gz reports/upload-manifest.json
          if git diff --cached --quiet; then
            echo "no fast manifest changes"
            exit 0
          fi

          EP_COUNT=$(python -c "import json; d=json.load(open('reports/upload-manifest.json')); print(d.get('new_count',0))")
          git commit -m "chore: refresh upload manifest (${EP_COUNT} ready episodes)"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main || true
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 3))
          done

          echo "failed to push fast manifest after retries"
          exit 1

      - name: Queue upload from existing manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main
          git reset --hard origin/main
          if python src/upload_queue_status.py --no-require-description; then
            gh workflow run sync.yml \
              -f batch_size="30" \
              -f num_shards="2" \
              -f allow_subtitles="true" \
              -f continue_uploads="true"
          else
            echo "fast manifest has no upload-ready episodes"
          fi

      - name: Prepare episode sources
        env:
          CZ_PROXY_URL: ${{ secrets.CZ_PROXY_URL }}
          CZ_PROXY_KEY: ${{ secrets.CZ_PROXY_KEY }}
          CZ_PROXY_MIN_GAP_SECONDS: "20"
          PREHRAJTO_SEARCH_MIN_INTERVAL: "20"
        run: |
          ARGS=(
            "--queue" "backlog/enriched-audit-queue.jsonl.gz"
            "--backlog" "backlog/series-episodes.jsonl.gz"
            "--out" "plans/prepared-episodes.jsonl"
            "--episode-limit" "${{ inputs.episode_limit || '60' }}"
            "--source-limit-per-episode" "${{ inputs.source_limit_per_episode || '8' }}"
            "--sample-seconds" "20"
            "--live-search"
            "--live-search-limit" "8"
            "--live-search-query-limit" "1"
            "--require-resolvable-source"
          )
          if [ "${{ inputs.use_whisper }}" = "true" ]; then
            ARGS+=("--use-whisper")
          fi
          python src/prepare_episode_sources.py "${ARGS[@]}"

      - name: Build upload manifest
        run: |
          python src/build_upload_manifest.py \
            --limit 1000 \
            --out manifests/upload-ready.jsonl.gz \
            --report reports/upload-manifest.json

      - name: Commit and push changes
        run: |
          set -e
          TMP_DIR="$(mktemp -d)"
          mkdir -p "$TMP_DIR/plans" "$TMP_DIR/audits"
          cp plans/prepared-episodes.jsonl "$TMP_DIR/plans/prepared-episodes.jsonl"
          cp plans/subtitle-followup-queue.jsonl "$TMP_DIR/plans/subtitle-followup-queue.jsonl"
          cp plans/whisper-review-queue.jsonl "$TMP_DIR/plans/whisper-review-queue.jsonl" 2>/dev/null || true
          cp audits/language-audit-latest.jsonl.gz "$TMP_DIR/audits/language-audit-latest.jsonl.gz" 2>/dev/null || true

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            mkdir -p plans audits manifests reports
            python src/merge_preparation_results.py --incoming-dir "$TMP_DIR"

            python src/build_upload_manifest.py \
              --limit 1000 \
              --out manifests/upload-ready.jsonl.gz \
              --report reports/upload-manifest.json

            git add plans/prepared-episodes.jsonl
            git add plans/subtitle-followup-queue.jsonl
            git add plans/whisper-review-queue.jsonl
            git add audits/language-audit-latest.jsonl.gz
            git add manifests/upload-ready.jsonl.gz
            git add reports/upload-manifest.json
            if git diff --cached --quiet; then
              echo "no changes to commit"
              exit 0
            fi

            EP_COUNT=$(python -c "import json; d=json.load(open('reports/upload-manifest.json')); print(d.get('new_count',0))")
            git commit -m "chore: prepare manifest (${EP_COUNT} new episodes)"
            if git push origin HEAD:main; then
              echo "push successful"
              exit 0
            fi
            echo "push race on attempt ${attempt}, retrying"
            sleep $((attempt * 3))
          done

          echo "failed to push after retries"
          exit 1

      - name: Queue upload from manifest
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if python src/upload_queue_status.py --no-require-description; then
            gh workflow run sync.yml \
              -f batch_size="30" \
              -f num_shards="2" \
              -f allow_subtitles="true" \
              -f continue_uploads="true"
          else
            echo "manifest has no upload-ready episodes"
          fi
